<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">

        <aside class="sidebar">

            <h2>OBRAS</h2>

            <ul>

                <li>Dashboard</li>
                <li>Obras</li>
                <li>Estruturas</li>
                <li>Postes</li>
                <li>Macros</li>
                <li>Notas Fiscais</li>
                <li>Relatórios</li>

            </ul>

        </aside>

        <main class="main-content">

            <header class="topbar">

                <h1>Painel Principal</h1>

            </header>

            <section class="cards">

                <div class="card">

                    <h3>Obras Ativas</h3>

                    <span>12</span>

                </div>

                <div class="card">

                    <h3>Macros Realizadas</h3>

                    <span>58</span>

                </div>

                <div class="card">

                    <h3>Equipes em Campo</h3>

                    <span>8</span>

                </div>

                <div class="card">

                    <h3>Produção Diária</h3>

                    <span>94%</span>

                </div>

            </section>

        </main>

    </div>

</body>
</html>
