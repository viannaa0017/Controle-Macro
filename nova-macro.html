<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Cadastro de Macro
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="container">

        <h1
            onclick="voltarDashboard()"
            class="titulo-click"
        >
            Cadastro de Macro
        </h1>

        <div class="macro-card">

            <h2>
                Dados da Macro
            </h2>

            <label>
                Número da Macro
            </label>

            <input
                type="text"
                id="numeroMacro"
                placeholder="Digite o número da macro"
            >

            <label>
                Equipe Responsável
            </label>

            <select id="equipeMacro">

                <option value="">
                    Selecione
                </option>

                <option>
                    SRO5414 - LUCAS NEU
                </option>

                <option>
                    SRO5501 - PAULO STEINBORN
                </option>

                <option>
                    SRO5081 - VANDERLEI PAQUEIRA
                </option>

                <option>
                    SRO5839 - SANDRO KUZEY
                </option>

                <option>
                    SRO5823 - JOÃO DURÃO
                </option>

                <option>
                    SRO5838 - WAGNER ANTUNES
                </option>

                <option>
                    SRO5658 - CLEVERSON PAYVA
                </option>

                <option>
                    SRO5363 - ELEMAR RATKE
                </option>

                <option>
                    SRO5483 - DARCI STEFFAN
                </option>

                <option>
                    SRO5761 - ELOI DE MOURA
                </option>

                <option>
                    SRO6252 - ALEXANDRE ANCEROWICZ
                </option>

                <option>
                    SRO6143 - JOSIAS GODOY
                </option>

            </select>

            <label>
                Descrição
            </label>

            <textarea
                id="descricaoMacro"
                placeholder="Descrição da macro"
            ></textarea>

        </div>

        <div
            class="macro-card"
            style="margin-top:25px;"
        >

            <h2>
                Atividades da Macro
            </h2>

            <input
                type="text"
                id="pesquisaAtividade"
                placeholder="Pesquisar atividade..."
                oninput="filtrarAtividades()"
            >

            <select id="selectAtividade">

                <option value="">
                    Selecione uma atividade
                </option>

            </select>

            <button
                class="btn btn-upload"
                style="margin-top:15px;"
                onclick="adicionarAtividade()"
            >

                Adicionar Atividade

            </button>

            <div
                id="atividadesSelecionadas"
                style="margin-top:25px;"
            >

            </div>

            <h2
                style="
                    margin-top:20px;
                    color:#60a5fa;
                "
            >

                Total US:
                <span id="totalUS">

                    0

                </span>

            </h2>

        </div>

        <button
            class="btn btn-upload"
            style="
                margin-top:25px;
                font-size:18px;
            "
            onclick="atribuirMacro()"
        >

            Salvar Macro

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
