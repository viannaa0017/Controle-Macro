<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="container">

        <h1>
            Controle de Obras
        </h1>

        <p>
            Faça login para acessar o sistema
        </p>

        <div class="macro-card">

            <label>Usuário</label>

            <input
                type="text"
                id="usuario"
                placeholder="Digite seu usuário">

            <label>Senha</label>

            <input
                type="password"
                id="senha"
                placeholder="Digite sua senha">

            <button
                class="btn btn-upload"
                style="margin-top:25px;"
                onclick="fazerLogin()">

                Entrar

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
